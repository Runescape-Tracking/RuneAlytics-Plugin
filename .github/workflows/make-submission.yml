name: Make Submission Branch

# Regenerates the test-free `submission` branch that the RuneLite Plugin Hub
# builds. Run manually (workflow_dispatch) or automatically when a release tag
# is pushed. Via scripts/make-submission.sh the job removes the unit-test suite
# (keeping the standard RuneAlyticsPluginTest launcher + shadowJar), strips
# checkstyle.xml, .github and scripts, trims checkstyle + mockito/mockwebserver
# from build.gradle, verifies the stripped tree still compiles, pushes the
# result to `submission`, and surfaces the commit SHA to paste into the
# plugin-hub PR.

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch or commit to derive the submission from'
        required: false
        default: master
  push:
    tags:
      - 'v*'

jobs:
  submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'

      - name: Configure git identity (CI runner only)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate submission branch
        id: gen
        run: |
          chmod +x ./gradlew scripts/make-submission.sh
          REF="${{ github.event.inputs.source_ref || github.ref_name }}"
          scripts/make-submission.sh "$REF" | tee make-submission.out
          echo "sha=$(tail -n1 make-submission.out)" >> "$GITHUB_OUTPUT"

      - name: Push submission branch
        run: git push --force origin submission

      - name: Report submission SHA
        run: |
          {
            echo "### Submission branch updated"
            echo ""
            echo "Point the plugin-hub PR at this commit:"
            echo ""
            echo '```'
            echo "${{ steps.gen.outputs.sha }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
